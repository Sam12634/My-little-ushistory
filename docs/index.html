<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Little US History</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>My Little US History</h1>

    <div id="game-container">
        <div id="elements-container"></div>

        <div id="combine-area">
            <p>Select two elements to combine</p>
            <div id="selected-elements"></div>
            <button id="combineButton">Combine</button>
        </div>

        <!-- ⭐ NEW: Hint button + display -->
        <div id="hint-section">
            <button id="hintButton">Get Hint</button>
            <div id="hintDisplay"></div>
        </div>
    </div>

    <!-- Your game scripts -->
    <script src="elements.js"></script>
    <script src="combinations.js"></script>

    <!-- ⭐ NEW: Supabase client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Main script -->
    <script src="script.js"></script>

</body>
</html>
