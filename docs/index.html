<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My-little-ushistory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>My-little-ushistory</h1>

  <div id="game">

    <!-- Element selection area -->
    <div>
      <h2>Choose two elements</h2>

      <!-- These dropdowns get filled by loadElements() -->
      <select id="elementA"></select>
      <select id="elementB"></select>

      <!-- Clicking this runs combine() -->
      <button id="combineBtn">Combine</button>
    </div>

    <!-- The result of the combination appears here -->
    <div id="result"></div>
  </div>

  <!-- Load your JavaScript file -->
  <script type="module" src="main.js"></script>
</body>
</html>
