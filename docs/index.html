<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My-little-ushistory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>My-little-ushistory</h1>

  <div id="game">
    <div>
      <h2>Choose two elements</h2>

      <!-- Dropdowns populated by loadElements() -->
      <select id="elementA"></select>
      <select id="elementB"></select>

      <!-- Button triggers combine() -->
      <button id="combineBtn">Combine</button>
    </div>

    <!-- This is where the result appears -->
    <div id="result"></div>
  </div>

  <!-- Your updated JS file -->
  <script type="module" src="main.js"></script>
</body>
</html>
