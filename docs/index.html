<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Little US History</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>My Little US History</h1>

  <div id="game-container">
    <div id="elements-container"></div>

    <div id="combine-area">
      <p>Select two elements to combine</p>
      <div id="selected-elements"></div>
      <button id="combineButton">Combine</button>
    </div>

    <div id="hint-section">
      <button id="hintButton">Get Hint</button>
      <div id="hintDisplay"></div>
    </div>
  </div>

  <!-- Load main game logic as a module -->
  <script type="module" src="main.js"></script>
</body>
</html>
